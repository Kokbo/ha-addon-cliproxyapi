name: CLIProxyAPI
version: "0.1.0"
slug: cliproxyapi
description: >-
  Wraps router-for-me/CLIProxyAPI as a Home Assistant addon. Exposes an
  OpenAI/Claude-compatible HTTP API backed by your Claude Code (and other) OAuth
  credentials.
url: "https://github.com/router-for-me/CLIProxyAPI"
arch:
  - aarch64
  - armv7
  - amd64
startup: services
boot: auto
init: false
ports:
  "8317/tcp": 8317
ports_description:
  "8317/tcp": CLIProxyAPI HTTP API
map:
  - config:rw
